apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lab02-ingress
  namespace: lab02
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /           # Strip the path prefix before forwarding
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: lab02.example.com
    http:
      paths:
      - path: /app1(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: app1-service
            port:
              number: 80
      - path: /app2(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: app2-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: app1-service            # Default backend
            port:
              number: 80
