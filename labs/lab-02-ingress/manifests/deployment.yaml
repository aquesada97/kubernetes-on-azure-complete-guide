apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  namespace: lab02
  labels:
    app: app1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
      - name: app1
        image: nginx:1.25
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
      initContainers:
      - name: init-html
        image: busybox
        command:
        - sh
        - -c
        - echo '<h1>App 1 - Path /app1</h1><p>Welcome to Application 1!</p>' > /html/index.html
        volumeMounts:
        - name: html
          mountPath: /html
      volumes:
      - name: html
        emptyDir: {}
---
