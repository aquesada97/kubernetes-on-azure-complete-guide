apiVersion: v1
kind: Service
metadata:
  name: azure-vote-back
  namespace: lab01
  labels:
    app: azure-vote-back
spec:
  type: ClusterIP
  selector:
    app: azure-vote-back
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: azure-vote-front
  namespace: lab01
  labels:
    app: azure-vote-front
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-sku: standard
spec:
  type: LoadBalancer
  selector:
    app: azure-vote-front
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
