apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-test
  namespace: lab03
  labels:
    app: storage-test
spec:
  replicas: 1                          # Must be 1 for ReadWriteOnce volumes
  selector:
    matchLabels:
      app: storage-test
  template:
    metadata:
      labels:
        app: storage-test
    spec:
      containers:
      - name: storage-test
        image: nginx:1.25
        ports:
        - containerPort: 80
        volumeMounts:
        - name: data-volume
          mountPath: /data             # Mount point inside the container
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: azure-disk-pvc    # Reference the PVC by name
